<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rensa Quiz-cache</title>
  <style>body{font-family:system-ui,sans-serif;max-width:680px;margin:60px auto;padding:0 20px;line-height:1.5}</style>
</head>
<body>
  <h1>Rensar lokal app-cache…</h1>
  <p id="status">Vänta ett ögonblick.</p>
  <p><a href="./">Tillbaka till quizet</a></p>
  <script>
    (async () => {
      try {
        if ("serviceWorker" in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((reg) => reg.unregister()));
        }
        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
        document.getElementById("status").textContent = "Cache rensad. Gå tillbaka till quizet och ladda om sidan.";
      } catch (error) {
        document.getElementById("status").textContent = "Kunde inte rensa allt automatiskt. Öppna DevTools > Application och rensa Service Workers/Storage.";
      }
    })();
  </script>
</body>
</html>
