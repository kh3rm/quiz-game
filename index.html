<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#07131c" id="theme-color">
  <meta name="description" content="Ett enkelt mobilvänligt och offlinekompatibelt pubquiz för fotboll och blandade kategorier.">
  <title>Quiz</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./assets/icons/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="48x48" href="./assets/icons/favicon-48x48.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/icons/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/apple-touch-icon.png">
  <link rel="preload" as="image" href="./assets/hero.webp">
  <link rel="preload" as="image" href="./assets/football-hero.webp">
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="view-football">
  <header class="hero" role="banner">
    <nav class="topbar" aria-label="Huvudnavigation">
      <div class="nav-links">
        <a href="#football" data-view-link="football">Fotbollsquiz</a>
        <a href="#quiz" data-view-link="custom">Quiz</a>
      </div>
    </nav>

    <section class="hero-copy" aria-label="Introduktion">
      <p class="kicker" id="hero-kicker">Sverige - Frankrike på lokal • fotbollsquiz</p>
      <h1 id="hero-title">Fotbollsquiz</h1>
      <p id="hero-description">Konstruera en runda med fotbollsfrågor.</p>
    </section>
  </header>

  <main id="app" class="app-shell" tabindex="-1">
    <noscript>Du behöver aktivera JavaScript för att köra quizet.</noscript>
  </main>

  <footer class="site-footer">
    <p>Spelhistoriken sparas lokalt i webbläsaren/PWA:n på den här enheten.</p>
  </footer>

  <script src="./quiz-data.js" defer></script>
  <script src="./app.js" defer></script>
</body>
</html>
